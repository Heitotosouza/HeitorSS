    <main class="container-downloads" style="margin-top: 120px; position: relative; z-index: 10;">

        <div class="search-bar">
            <input type="text" id="filterFiles" placeholder="DIGITE O NOME DO ARQUIVO..." onkeyup="filtrarArquivos()">

        <div class="category-filters">
            <button class="btn-filter active" onclick="filtrarCategoria('todos')">TODOS</button>

    <div id="adminModal" class="modal-admin">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h2 class="titulo-sessao">ACESSO RESTRITO</h2>
    
            <div id="loginArea">
                <input type="password" id="adminPass" placeholder="SENHA DE ACESSO">
                <button onclick="verificarSenha()" class="btn-dl">ENTRAR</button>
            </div>
    
            <div id="adminForm" style="display: none;">
                <input type="text" id="nomeArq" placeholder="Nome do Arquivo">
                <select id="catArq">
                    <option value="logica">Lógica</option>
                    <option value="social">Social</option>
                    <option value="web">Web</option>
                    <option value="jogos">Jogos</option>
                </select>
                <input type="text" id="tamArq" placeholder="Ex: 5 MB">
    
                <input type="url" id="linkArq" placeholder="Link do Drive">
    
                <div style="display: flex; align-items: center; margin: 15px 0;">
                    <hr style="flex: 1; border: 0; border-top: 1px solid #00ff7f; opacity: 0.3;">
                    <span style="padding: 0 10px; color: #00ff7f; font-size: 10px; font-family: 'Press Start 2P';">OU</span>
                    <hr style="flex: 1; border: 0; border-top: 1px solid #00ff7f; opacity: 0.3;">
                </div>
    
                <label for="fileInput"
                    style="color: #00ff7f; font-size: 10px; display: block; margin-bottom: 5px; text-align: left;">UPLOAD
                    DIRETO:</label>
                <input type="file" id="fileInput"
                    style="background: rgba(0, 255, 127, 0.1); border: 1px dashed #00ff7f; padding: 10px; color: white; cursor: pointer; width: 100%; box-sizing: border-box;">
    
                <button onclick="salvarNoBanco()" class="btn-dl" style="margin-top: 20px;">POSTAR ARQUIVO</button>
            </div>
        </div>
